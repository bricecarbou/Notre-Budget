services:
  - type: web
    name: notre-budget
    env: node
    plan: free
    buildCommand: "npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend && npm run build --prefix backend"
    startCommand: "npm run start --prefix backend"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notre-budget-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: SEED_ADMIN_LOGIN
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false

databases:
  - name: notre-budget-db
    plan: free
